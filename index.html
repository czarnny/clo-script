<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLO-SCRIPT AI</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9330645019595213" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #fff url('image_1.png') no-repeat center center fixed; background-size: cover; color: #000; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-wrapper { width: 100%; max-width: 600px; margin-bottom: 25px; }
        .container { background: rgba(255, 255, 255, 0.96); padding: 25px; border: 2px solid #000; box-shadow: 8px 8px 0px #000; }
        .header-title { font-size: 1.8em; font-weight: bold; text-align: center; margin-bottom: 15px; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; border: 1px solid #000; background: #eee; cursor: pointer; text-align: center; font-weight: bold; font-size: 0.7em; }
        .tab.active { background: #000; color: #fff; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #000; box-sizing: border-box; font-family: 'Courier New'; outline: none; }
        button { width: 100%; background: #000; color: #fff; border: 1px solid #000; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #chat-window { height: 350px; background: #000; color: #fff; padding: 15px; overflow-y: auto; border: 1px solid #000; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; font-size: 0.85em; position: relative; overflow: hidden; }
        .msg-author { font-weight: bold; color: #00ff00; margin-right: 5px; }
        .admin-label { color: #ff0000; font-weight: bold; font-size: 0.7em; border: 1px solid #ff0000; padding: 0 4px; margin-right: 5px; }
        .del-btn { background: red; color: white; border: none; padding: 0 5px; font-size: 0.6em; cursor: pointer; float: right; margin-left: 10px; }
        .chat-img { max-width: 200px; max-height: 200px; border: 1px solid #00ff00; margin-top: 5px; display: block; border-radius: 4px; cursor: pointer; }
        #result { margin-top: 15px; padding: 15px; border: 1px solid #000; background: #f9f9f9; white-space: pre-wrap; display: none; font-size: 0.8em; }
        .forgot-pass { display: block; text-align: center; font-size: 0.65em; margin-top: 10px; cursor: pointer; text-decoration: underline; color: #555; }
        #settings-panel { display: none; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #000; }
        .file-label { display: block; text-align: center; background: #eee; border: 1px solid #000; padding: 8px; font-size: 0.6em; font-weight: bold; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-wrapper" id="auth-ui">
    <div class="container">
        <div class="header-title">CLO-SCRIPT</div>
        <div class="tabs">
            <div id="tabLogin" class="tab active" onclick="showTab('login')">WEJŚCIE</div>
            <div id="tabReg" class="tab" onclick="showTab('reg')">REJESTRACJA</div>
        </div>
        <div id="formLogin">
            <input type="email" id="loginEmail" placeholder="TWÓJ GMAIL">
            <input type="password" id="loginPass" placeholder="HASŁO">
            <button id="loginBtn">ZALOGUJ</button>
            <span class="forgot-pass" id="resetBtn">ZAPOMNIAŁEŚ HASŁA?</span>
        </div>
        <div id="formReg" style="display: none;">
            <input type="text" id="regNick" placeholder="TWÓJ NICK">
            <input type="email" id="regEmail" placeholder="TWÓJ GMAIL">
            <input type="password" id="regPass" placeholder="HASŁO (min. 6 znaków)">
            <button id="regBtn">ZAŁÓŻ KONTO</button>
        </div>
    </div>
</div>

<div class="main-wrapper" id="generator-ui" style="display: none;">
    <div class="container">
        <div class="header-title">CLO-SCRIPT</div>
        <input type="file" id="imageInput" accept="image/*">
        <input type="text" id="sizeInput" placeholder="ROZMIAR">
        <textarea id="userNotes" placeholder="DODATKOWE INFO..."></textarea>
        <button id="genBtn">GENERUJ OPIS</button>
        <div id="status" style="text-align:center; margin-top:10px; font-weight:bold; font-size: 0.7em;"></div>
        <div id="result"></div>
    </div>
</div>

<div class="main-wrapper" id="chat-ui" style="display: none;">
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="font-size: 0.7em;">USER: <b id="userDisplay"></b></span>
            <div>
                <button onclick="toggleSettings()" style="width:auto; padding:3px 8px; font-size:0.5em; background:#eee; color:#000; border:1px solid #000;">USTAWIENIA ⚙️</button>
                <button id="logoutBtn" style="width: auto; padding: 5px 10px; font-size: 0.5em; background: red; border:none; margin-left:5px;">WYLOGUJ</button>
            </div>
        </div>
        <div id="settings-panel">
            <input type="text" id="newNickInput" placeholder="NOWY NICK">
            <button id="updateNickBtn" style="font-size: 0.6em; padding: 10px; margin-bottom: 10px;">ZMIEŃ NICK</button>
        </div>
        <div id="chat-window"></div>
        <div style="display: flex; flex-direction: column; gap: 2px;">
            <div style="display: flex; gap: 5px;">
                <input type="text" id="chatInput" placeholder="WIADOMOŚĆ..." style="margin:0;">
                <button id="sendBtn" style="width: 70px; margin:0; font-size: 0.6em;">OK</button>
            </div>
            <label class="file-label">
                📷 WYŚLIJ FOTKĘ
                <input type="file" id="chatFile" accept="image/*" style="display:none">
            </label>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const firebaseConfig = {
        apiKey: "AIzaSyCoqVckP7wORrT7_4S_RKt3_B78s3Hr9h4",
        authDomain: "clo-script.firebaseapp.com",
        projectId: "clo-script",
        storageBucket: "clo-script.firebasestorage.app",
        messagingSenderId: "951625390537",
        appId: "1:951625390537:web:a1d8ff99c5d8c2719d3018"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_EMAIL = "boorkopasz@gmail.com";

    window.showTab = (t) => {
        document.getElementById('formLogin').style.display = t === 'login' ? 'block' : 'none';
        document.getElementById('formReg').style.display = t === 'reg' ? 'block' : 'none';
        document.getElementById('tabLogin').classList.toggle('active', t === 'login');
        document.getElementById('tabReg').classList.toggle('active', t === 'reg');
    };

    window.toggleSettings = () => {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('generator-ui').style.display = 'block';
            document.getElementById('chat-ui').style.display = 'block';
            document.getElementById('userDisplay').innerText = user.displayName || user.email.split('@')[0];
            loadChat();
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('generator-ui').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value); } 
        catch (err) { alert("BŁĄD: " + err.message); }
    };

    document.getElementById('regBtn').onclick = async () => {
        try {
            const res = await createUserWithEmailAndPassword(auth, document.getElementById('regEmail').value, document.getElementById('regPass').value);
            await updateProfile(res.user, { displayName: document.getElementById('regNick').value });
            location.reload();
        } catch (err) { alert("BŁĄD: " + err.message); }
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    document.getElementById('sendBtn').onclick = async () => {
        const msg = document.getElementById('chatInput').value;
        if (!msg.trim()) return;
        await addDoc(collection(db, "messages"), { text: msg, author: auth.currentUser.displayName, email: auth.currentUser.email, createdAt: serverTimestamp() });
        document.getElementById('chatInput').value = "";
    };

    // FUNKCJA NAPRAWCZA - ZMNIEJSZANIE ZDJĘĆ
    document.getElementById('chatFile').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 400; // Zmniejszamy fotkę do 400px
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // Kompresja do 60% jakości
                await addDoc(collection(db, "messages"), { imgData: dataUrl, author: auth.currentUser.displayName, email: auth.currentUser.email, createdAt: serverTimestamp() });
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function loadChat() {
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"), limit(40));
        onSnapshot(q, (snap) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            snap.forEach(mDoc => {
                const d = mDoc.data();
                const isAdminMsg = d.email === ADMIN_EMAIL;
                const isCurrentUserAdmin = auth.currentUser.email === ADMIN_EMAIL;
                const delBtn = isCurrentUserAdmin ? `<button class="del-btn" onclick="window.del('${mDoc.id}')">X</button>` : '';
                const adminTag = isAdminMsg ? '<span class="admin-label">ADMIN</span>' : '';
                let content = d.text ? `<span>${d.text}</span>` : `<img src="${d.imgData}" class="chat-img" onclick="window.open(this.src)">`;
                win.innerHTML += `<div class="msg">${delBtn}${adminTag}<span class="msg-author">${d.author}:</span>${content}</div>`;
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    window.del = (id) => confirm("USUNĄĆ?") && deleteDoc(doc(db, "messages", id));

    document.getElementById('genBtn').onclick = async () => {
        const file = document.getElementById('imageInput').files[0];
        if (!file) return alert("Wybierz zdjęcie!");
        document.getElementById('status').innerText = "AI PRACUJE...";
        try {
            const genAI = new GoogleGenerativeAI("AIzaSyCf1frwAF1OAOFVngfNSPEwLDKKUBXmCQw");
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                const res = await model.generateContent([{ inlineData: { data: base64, mimeType: file.type } }, { text: "Opisz techwear na Vinted, rozmiar: " + document.getElementById('sizeInput').value + ". " + document.getElementById('userNotes').value }]);
                document.getElementById('result').innerText = (await res.response).text();
                document.getElementById('result').style.display = "block";
                document.getElementById('status').innerText = "GOTOWE.";
            };
        } catch (e) { alert("BŁĄD AI: " + e.message); }
    };
</script>
</body>
</html>
