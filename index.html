<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLO-SCRIPT AI | RECOVERY MODE</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9330645019595213"
     crossorigin="anonymous"></script>

    <style>
        /* Zachowuję Twój styl, dodaję tylko małe poprawki dla linku resetu */
        body { font-family: 'Courier New', Courier, monospace; background: #fff url('image_1.png') no-repeat center center fixed; background-size: cover; color: #000; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-wrapper { width: 100%; max-width: 600px; margin-bottom: 25px; }
        .container { background: rgba(255, 255, 255, 0.96); padding: 25px; border: 2px solid #000; box-shadow: 8px 8px 0px #000; }
        .header-title { font-size: 1.8em; font-weight: bold; text-align: center; margin-bottom: 15px; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        /* Styl dla kontenera reklamy */
        .ad-container { margin: 15px 0; text-align: center; min-height: 90px; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; border: 1px solid #000; background: #eee; cursor: pointer; text-align: center; font-weight: bold; font-size: 0.7em; }
        .tab.active { background: #000; color: #fff; }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #000; box-sizing: border-box; font-family: 'Courier New'; outline: none; }
        button { width: 100%; background: #000; color: #fff; border: 1px solid #000; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        #chat-window { height: 350px; background: #000; color: #fff; padding: 15px; overflow-y: auto; border: 1px solid #000; margin-bottom: 10px; }
        .msg { margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 6px; }
        .msg-author { font-weight: bold; color: #00ff00; text-transform: uppercase; margin-right: 8px; font-size: 0.85em; }
        .admin-label { color: #ff0000; font-weight: bold; font-size: 0.7em; border: 1px solid #ff0000; padding: 0 4px; margin-right: 8px; }

        /* Styl dla linku resetowania */
        .forgot-pass { display: block; text-align: center; font-size: 0.65em; margin-top: 10px; cursor: pointer; text-decoration: underline; color: #555; }
        .forgot-pass:hover { color: #000; }

        #settings-panel { display: none; margin-top: 15px; padding-top: 15px; border-top: 2px dashed #000; }
        #result { margin-top: 15px; padding: 15px; border: 1px solid #000; background: #f9f9f9; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>

<div class="main-wrapper" id="generator-ui" style="display: none;">
    <div class="container">
        <div class="header-title">AI GENERATOR</div>
        
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-9330645019595213"
                 data-ad-slot="auto"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <input type="file" id="imageInput" accept="image/*">
        <input type="text" id="sizeInput" placeholder="ROZMIAR">
        <textarea id="userNotes" placeholder="DODATKOWE INFO..."></textarea>
        <button id="genBtn">GENERUJ OPIS</button>
        <div id="status" style="text-align:center; margin-top:10px; font-weight:bold; font-size: 0.7em;"></div>
        <div id="result"></div>
    </div>
</div>

<div class="main-wrapper" id="auth-ui">
    <div class="container">
        <div class="header-title">LOGOWANIE</div>
        <div class="tabs">
            <div id="tabLogin" class="tab active" onclick="showTab('login')">WEJŚCIE</div>
            <div id="tabReg" class="tab" onclick="showTab('reg')">REJESTRACJA</div>
        </div>
        <div id="formLogin">
            <input type="email" id="loginEmail" placeholder="TWÓJ GMAIL">
            <input type="password" id="loginPass" placeholder="HASŁO">
            <button id="loginBtn">ZALOGUJ</button>
            <span class="forgot-pass" id="resetBtn">Zapomniałeś hasła? Kliknij tutaj.</span>
        </div>
        <div id="formReg" style="display: none;">
            <input type="text" id="regNick" placeholder="NICK">
            <input type="email" id="regEmail" placeholder="GMAIL">
            <input type="password" id="regPass" placeholder="HASŁO (min. 6 znaków)">
            <button id="regBtn">STWÓRZ KONTO</button>
        </div>
    </div>
</div>

<div class="main-wrapper" id="chat-ui" style="display: none;">
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div>
                <span style="font-weight:bold; font-size: 0.75em;">NICK: <span id="userDisplay" style="color:blue"></span></span>
                <button onclick="toggleSettings()" style="width:auto; padding:3px 8px; font-size:0.6em; background:#eee; color:#000; border:1px solid #000; margin-left:10px;">USTAWIENIA ⚙️</button>
            </div>
            <button id="logoutBtn" style="width: auto; padding: 5px 10px; font-size: 0.6em; background: red; border:none;">WYLOGUJ</button>
        </div>

        <div id="settings-panel">
            <input type="text" id="newNickInput" placeholder="Nowy nick" style="font-size: 0.8em;">
            <button id="updateNickBtn" style="font-size: 0.6em; padding: 10px; margin-bottom: 10px;">ZMIEŃ NICK</button>
            <input type="password" id="newPassInput" placeholder="Nowe hasło" style="font-size: 0.8em;">
            <button id="updatePassBtn" style="font-size: 0.6em; padding: 10px;">ZMIEŃ HASŁO</button>
        </div>

        <div id="chat-window"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text"
